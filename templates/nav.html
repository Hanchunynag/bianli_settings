<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设置导航录制 Web 控制台</title>
  <link rel="stylesheet" href="/static/nav.css" />
</head>
<body>
  <header class="topbar">
    <div class="statusBlock">
      <h1>设置导航录制 Web 控制台</h1>
      <div class="meta">
        <span>page_name: <b id="pageName">-</b></span>
        <span>active_nav_state: <b id="activePage">-</b></span>
        <span>title: <b id="title">-</b></span>
        <span>pending: <b id="pending">-</b></span>
      </div>
      <div id="warning" class="warning hidden"></div>
      <div id="overlayStatus" class="warning hidden"></div>
      <div id="error" class="error hidden"></div>
    </div>
    <div class="actions">
      <div class="primaryActions">
        <button id="captureBtn" class="primary">重新采集</button>
        <button id="backBtn">返回</button>
        <button id="samePageModeBtn">录制页面内变化</button>
      </div>
      <details id="moreActions" class="moreActions">
        <summary>更多操作</summary>
        <div class="morePanel">
          <div class="actionGroup">
            <div class="actionGroupTitle">页面</div>
            <button id="continuePageBtn" class="secondary">继续录制当前页面</button>
            <button id="markOverlayBtn" class="secondary">标记弹窗</button>
          </div>
          <div class="actionGroup">
            <div class="actionGroupTitle">页面内操作</div>
            <select id="operationGesture" class="actionInput">
              <option value="swipe_left">左滑</option>
              <option value="swipe_right">右滑</option>
              <option value="swipe_up">上滑</option>
              <option value="swipe_down">下滑</option>
              <option value="tap">点击</option>
              <option value="long_press">长按</option>
            </select>
            <input id="operationEffect" class="actionInput" placeholder="效果，如：切换下一个主题" />
            <button id="pageOperationModeBtn" class="secondary">录制页面内操作</button>
          </div>
          <div class="actionGroup">
            <div class="actionGroupTitle">横向视图</div>
            <button id="swipeLeftBtn" class="secondary">横向左滑</button>
            <button id="swipeRightBtn" class="secondary">横向右滑</button>
          </div>
          <div class="actionGroup">
            <div class="actionGroupTitle">维护</div>
            <button id="clearPendingBtn" class="secondary">清空 pending</button>
            <button id="graphBtn" class="secondary">查看 graph JSON</button>
          </div>
        </div>
      </details>
    </div>
  </header>
  <div id="loading" class="loading hidden">正在执行，请稍候…</div>
  <main class="layout">
    <section class="panel directoryPanel">
      <div class="panelHeader">
        <h2>页面目录</h2>
      </div>
      <div id="pageDirectory" class="directory"></div>
      <div id="pageDetail" class="pageDetail"></div>
    </section>
    <section class="panel screenPanel">
      <div class="screenWrap" id="screenWrap">
        <img id="screen" alt="current_screen.png" />
        <div id="overlay" class="overlay"></div>
      </div>
    </section>
    <section class="panel listPanel">
      <div class="panelHeader">
        <h2>可达页面</h2>
      </div>
      <div id="chainStatus" class="chainStatus hidden"></div>
      <div id="reachablePages" class="reachablePages"></div>
      <pre id="graphBox" class="graphBox hidden"></pre>
    </section>
  </main>
  <script type="module" src="/static/nav.js"></script>
</body>
</html>
